server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    autoindex off;

    # Explicitly block common project/config files from being served.
    location ~* (^|/)(Dockerfile|docker-compose\.ya?ml|compose\.ya?ml|Makefile|build-site\.mjs|.*\.md)$ {
        return 404;
    }

    # Hide private/internal directories.
    location ~* (^|/)(_private|assets)(/|$) {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
